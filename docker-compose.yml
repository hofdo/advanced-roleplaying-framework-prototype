services:
  postgres:
    image: postgres:16-alpine
    container_name: roleplaying-engine-postgres
    environment:
      POSTGRES_DB: roleplay
      POSTGRES_USER: roleplay
      POSTGRES_PASSWORD: roleplay
    ports:
      - "5432:5432"
    volumes:
      - roleplay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roleplay -d roleplay"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  roleplay-postgres-data:
